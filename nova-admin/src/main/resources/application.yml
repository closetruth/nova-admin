spring:
  application:
    name: nova-admin

  datasource:
    url: jdbc:mysql://localhost:3306/nova_admin
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}

servlet:
  multipart:
    max-file-size: 10MB
    max-request-size: 100MB

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug

# Override via JWT_SECRET in production
jwt:
  secret: ${JWT_SECRET:nova-admin-local-dev-secret-change-me}
  expire-ms: 43200000

aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
    bucketName: ${OSS_BUCKET:your-bucket-name}
    region: ${OSS_REGION:cn-beijing}
